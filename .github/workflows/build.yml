name: Build y Release

on:
  push:
    tags:
      - "v*"          # Se activa al hacer: git tag v1.2.0 && git push --tags

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install pyinstaller

      - name: Compilar .exe con PyInstaller
        run: |
          pyinstaller --onefile --windowed --icon=icono.ico --name=JustTimer JustTimer.py
        # Si no tenés icono.ico, sacá --icon=icono.ico

      -  name: Empaquetar en zip
        run: |
          mkdir release
          copy dist\JustTimer.exe release\
          xcopy sonidos release\sonidos\ /E /I
          Compress-Archive -Path release\* -DestinationPath JustTimerPlus.zip

      - name: Publicar release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: JustTimerPlus.zip