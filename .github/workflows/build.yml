name: Build y Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Instalar dependencias
        run: pip install pyinstaller

      - name: Compilar .exe con PyInstaller
        run: pyinstaller --onefile --windowed --icon=logo.ico --name=JustTimer JustTimer.py

      - name: Empaquetar en zip
        run: |
          mkdir release
          copy dist\JustTimer.exe release\
          xcopy sonidos release\sonidos\ /E /I
          Compress-Archive -Path release\* -DestinationPath JustTimerPlus.zip

      - name: Publicar release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            JustTimerPlus.zip
            dist\JustTimer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}